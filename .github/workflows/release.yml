name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pp-web/frontend/package-lock.json

      - name: Build frontend dist
        run: |
          cd pp-web/frontend
          npm ci
          npm run build
          cd ../..
          tar -czf pp-web-frontend.tar.gz -C pp-web/frontend dist

      - name: Build binaries
        run: |
          mkdir -p bin
          # Build pp
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o bin/pp_linux_amd64 ./cmd/pp
          # Build pp-web
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o bin/pp-web_linux_amd64 ./cmd/pp-web

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -l --format='%(contents)' ${{ github.ref_name }} > release_notes.txt
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.txt \
            --generate-notes \
            bin/pp_linux_amd64 bin/pp-web_linux_amd64 pp-web-frontend.tar.gz
