name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pp-web/frontend/package-lock.json

      - name: Build frontend dist
        run: |
          cd pp-web/frontend
          npm ci
          npm run build
          cd ../..
          tar -czf pp-web-frontend.tar.gz -C pp-web/frontend dist

      - name: Build binaries
        run: |
          mkdir -p bin
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          GIT_COMMIT="$(git rev-parse --verify HEAD)"
          LDFLAGS="-s -w -X main.version=${{ github.ref_name }} -X main.buildDate=${BUILD_DATE} -X main.gitCommit=${GIT_COMMIT}"
          # Build pp-core
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/pp-core_linux_amd64 ./cmd/pp-core
          # Build pp-client
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/pp-client_linux_amd64 ./cmd/pp-client
          # Build pp-web
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/pp-web_linux_amd64 ./cmd/pp-web
          # Build pp-client Windows
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/pp-client_windows_amd64.exe ./cmd/pp-client
          zip -j bin/pp-client_windows_amd64.zip bin/pp-client_windows_amd64.exe

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Получаем SHA объекта тега через GitHub API
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/${{ github.ref_name }} --jq '.object.sha')
          
          # Получаем сообщение тега через GitHub API (чтобы избежать проблем с локальным git checkout)
          MSG=$(gh api repos/${{ github.repository }}/git/tags/$TAG_SHA --jq '.message' 2>/dev/null || echo "")
          
          # Если сообщение пустое или null (например, это lightweight тег), берем сообщение коммита
          if [ -z "$MSG" ] || [ "$MSG" = "null" ]; then
            MSG=$(git log -1 --format=%B)
          fi
          
          echo "Описания релиза получено через API"
          
          # Сохраняем в файл, чтобы корректно передать многострочный текст
          echo "$MSG" > release_notes.txt
          
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.txt \
            --generate-notes \
            bin/pp-core_linux_amd64 bin/pp-client_linux_amd64 bin/pp-web_linux_amd64 bin/pp-client_windows_amd64.zip pp-web-frontend.tar.gz
