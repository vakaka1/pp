version: 2

project_name: pp

before:
  hooks:
    - go mod tidy

builds:
  - id: pp-core
    main: ./cmd/pp-core
    binary: pp-core
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.gitCommit={{.Commit}}
  - id: pp-client-linux
    main: ./cmd/pp-client
    binary: pp-client
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.gitCommit={{.Commit}}
  - id: pp-client-windows
    main: ./cmd/pp-client
    binary: pp-client
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.gitCommit={{.Commit}}
  - id: pp-web-amd64
    main: ./cmd/pp-web
    binary: pp-web
    env:
      - CGO_ENABLED=1
      - CC=gcc
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.gitCommit={{.Commit}}

archives:
  - id: pp-core-archive
    ids:
      - pp-core
    name_template: "pp-core_{{ .Os }}_{{ .Arch }}"
    formats: ["binary"]
  - id: pp-client-linux-archive
    ids:
      - pp-client-linux
    name_template: "pp-client_{{ .Os }}_{{ .Arch }}"
    formats: ["binary"]
  - id: pp-client-windows-archive
    ids:
      - pp-client-windows
    name_template: "pp-client_{{ .Os }}_{{ .Arch }}"
    formats: ["zip"]
    files:
      - none*
  - id: pp-web-archive
    ids:
      - pp-web-amd64
    name_template: "pp-web_{{ .Os }}_{{ .Arch }}"
    formats: ["binary"]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: vakaka1
    name: pp
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  footer: |
    ## Установка

    **Сервер (Linux):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/vakaka1/pp/main/scripts/install-server.sh | sudo bash
    ```

    **Клиент (Linux):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/vakaka1/pp/main/scripts/install-client.sh | bash
    ```

    **Клиент (Windows — PowerShell):**
    ```powershell
    irm https://raw.githubusercontent.com/vakaka1/pp/main/scripts/install-client.ps1 | iex
    ```

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "🚀 Features"
      regexp: "^feat"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "⚡ Performance"
      regexp: "^perf"
      order: 2
    - title: "Other"
      order: 999
